name: Refresh Google Reviews

# Runs daily at 6am EST (11:00 UTC)
on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch reviews and update widget
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_PLACE_ID: ${{ secrets.GOOGLE_PLACE_ID }}
        run: bash refresh-reviews.sh

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add google-reviews-widget.html .reviews_archive.json
          git diff --staged --quiet || git commit -m "Auto-refresh Google reviews $(date +'%Y-%m-%d')"
          git push
