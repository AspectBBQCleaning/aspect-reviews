<meta charset="UTF-8">

<title>Google Reviews</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: transparent;
    overflow: hidden;
  }

  .reviews-widget {
    width: 100%;
    margin: 0 auto;
    padding: 12px 0 0 0;
    overflow: hidden;
    position: relative;
  }

  /* ── Carousel Track ── */
  .carousel-row {
    display: flex;
    width: max-content;
    gap: 20px;
    padding: 10px 0;
  }

  .row-1 { animation: scrollLeft 120s linear infinite; }
  .row-2 { animation: scrollRight 130s linear infinite; margin-top: 10px; }

  .carousel-row:hover { animation-play-state: paused; }

  @keyframes scrollLeft {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  @keyframes scrollRight {
    0%   { transform: translateX(-50%); }
    100% { transform: translateX(0); }
  }

  /* ── Review Card ── */
  .review-card {
    flex-shrink: 0;
    width: 360px;
    background: #ffffff;
    border: 1px solid rgba(34, 96, 51, 0.08);
    border-radius: 16px;
    padding: 26px 28px;
    box-shadow: 0 2px 12px rgba(0, 0, 0, 0.05), 0 1px 3px rgba(0, 0, 0, 0.03);
    transition: box-shadow 0.3s ease, transform 0.3s ease;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }

  .review-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, #226033, #22A033);
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .review-card:hover {
    box-shadow: 0 8px 30px rgba(34, 96, 51, 0.12), 0 2px 8px rgba(0, 0, 0, 0.06);
    transform: translateY(-2px);
  }

  .review-card:hover::before { opacity: 1; }

  /* Card Top */
  .card-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .stars { display: flex; gap: 3px; }
  .star-icon { width: 18px; height: 18px; }
  .star-filled { color: #D4A017; }
  .star-empty  { color: #ddd; }
  .google-icon { width: 22px; height: 22px; opacity: 0.6; }

  /* Review Text */
  .review-text {
    font-size: 14px;
    line-height: 1.65;
    color: #333;
    margin-bottom: 18px;
    display: -webkit-box;
    -webkit-line-clamp: 4;
    -webkit-box-orient: vertical;
    overflow: hidden;
    text-overflow: ellipsis;
    min-height: 92px;
  }

  .read-more-hint {
    font-size: 12px;
    color: #22A033;
    font-weight: 500;
    margin-top: -12px;
    margin-bottom: 14px;
  }

  /* Reviewer Info */
  .reviewer-info {
    display: flex;
    align-items: center;
    gap: 12px;
    padding-top: 14px;
    border-top: 1px solid rgba(34, 96, 51, 0.07);
  }

  .reviewer-avatar {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: linear-gradient(135deg, #226033, #22A033);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-weight: 600;
    font-size: 15px;
    flex-shrink: 0;
    user-select: none;
  }

  .reviewer-details { display: flex; flex-direction: column; }

  .reviewer-name {
    font-size: 13.5px;
    font-weight: 600;
    color: #1a1a1a;
  }

  .review-date {
    font-size: 11.5px;
    color: #999;
    margin-top: 2px;
  }

  /* ── Review Count Footer ── */
  .review-count-footer {
    text-align: center;
    padding: 18px 0 8px;
    font-size: 13px;
    color: #d9d9d9;
    letter-spacing: 0.2px;
  }

  .review-count-footer svg {
    width: 14px;
    height: 14px;
    vertical-align: -2px;
    margin-right: 4px;
  }

  .review-count-number {
    font-weight: 600;
    color: #FFFFFF;
  }

  /* ── Empty State ── */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: #999;
    font-size: 14px;
    display: none;
  }

  /* ── Modal Overlay ── */
  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    z-index: 1000;
    justify-content: center;
    align-items: center;
    padding: 20px;
    opacity: 0;
    transition: opacity 0.25s ease;
  }

  .modal-overlay.active {
    display: flex;
    opacity: 1;
  }

  .modal-card {
    background: #fff;
    border-radius: 20px;
    max-width: 520px;
    width: 100%;
    max-height: 80vh;
    overflow-y: auto;
    padding: 36px;
    box-shadow: 0 24px 80px rgba(0, 0, 0, 0.2);
    position: relative;
    transform: translateY(10px);
    transition: transform 0.25s ease;
  }

  .modal-overlay.active .modal-card { transform: translateY(0); }

  .modal-close {
    position: absolute;
    top: 16px; right: 16px;
    width: 32px; height: 32px;
    border-radius: 50%;
    border: none;
    background: #f3f3f3;
    color: #666;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
  }

  .modal-close:hover { background: #e5e5e5; color: #333; }
  .modal-stars { display: flex; gap: 3px; margin-bottom: 6px; }
  .modal-stars .star-icon { width: 22px; height: 22px; }
  .modal-date { font-size: 12px; color: #999; margin-bottom: 20px; }

  .modal-text {
    font-size: 15px;
    line-height: 1.75;
    color: #333;
    margin-bottom: 24px;
    white-space: pre-wrap;
  }

  .modal-reviewer {
    display: flex;
    align-items: center;
    gap: 12px;
    padding-top: 18px;
    border-top: 1px solid rgba(34, 96, 51, 0.07);
  }

  .modal-reviewer .reviewer-avatar {
    width: 44px; height: 44px;
    font-size: 18px;
  }

  .modal-reviewer .reviewer-name { font-size: 15px; font-weight: 600; color: #1a1a1a; }
  .modal-reviewer .review-date { font-size: 12px; color: #999; }

  .modal-google-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: #999;
    margin-top: 16px;
  }

  .modal-google-badge svg { width: 16px; height: 16px; }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    .review-card { width: 290px; padding: 20px; }
    .reviews-widget { padding: 8px 0 0 0; }
    .carousel-row { gap: 14px; }
    .modal-card { padding: 24px; margin: 10px; }
  }

  // ─── Helpers ───
  function starSVG(filled) {
    return '<svg class="star-icon ' + (filled ? 'star-filled' : 'star-empty') + '" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>';
  }

  function starsHTML(rating) {
    var s = '';
    for (var i = 1; i <= 5; i++) s += starSVG(i <= rating);
    return s;
  }

  function getInitials(name) {
    if (!name) return '?';
    var parts = name.trim().split(/\s+/);
    if (parts.length >= 2) return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
    return parts[0][0].toUpperCase();
  }

  var googleG = '<svg class="google-icon" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>';

  // ─── Build Card ───
  function buildCard(review, index) {
    var initials = getInitials(review.author_name);
    var relTime = review.relative_time_description || '';
    var readMore = (review.text || '').length > 150 ? '<div class="read-more-hint">Read more</div>' : '';

    return '<div class="review-card" onclick="openReview(' + index + ')">' +
      '<div class="card-top"><div class="stars">' + starsHTML(review.rating) + '</div>' + googleG + '</div>' +
      '<div class="review-text">' + (review.text || '').replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</div>' +
      readMore +
      '<div class="reviewer-info">' +
        '<div class="reviewer-avatar">' + initials + '</div>' +
        '<div class="reviewer-details">' +
          '<span class="reviewer-name">' + (review.author_name || 'Google User').replace(/</g, '&lt;') + '</span>' +
          '<span class="review-date">' + relTime + '</span>' +
        '</div>' +
      '</div>' +
    '</div>';
  }

  // ─── Modal ───
  var modal = document.getElementById('reviewModal');
  document.getElementById('modalClose').addEventListener('click', closeModal);
  modal.addEventListener('click', function(e) { if (e.target === modal) closeModal(); });
  document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeModal(); });

  window.openReview = function(index) {
    var review = CACHED_DATA.reviews[index % CACHED_DATA.reviews.length];
    if (!review) return;
    document.getElementById('modalStars').innerHTML = starsHTML(review.rating);
    document.getElementById('modalDate').textContent = review.relative_time_description || '';
    document.getElementById('modalText').textContent = review.text || '';
    document.getElementById('modalAvatar').textContent = getInitials(review.author_name);
    document.getElementById('modalName').textContent = review.author_name || 'Google User';
    modal.classList.add('active');
    document.body.style.overflow = 'hidden';
  };

  function closeModal() {
    modal.classList.remove('active');
    document.body.style.overflow = 'hidden';
  }

  // ─── Render ───
  function renderCarousel(reviews) {
    if (!reviews || reviews.length === 0) {
      document.getElementById('emptyState').style.display = 'block';
      document.getElementById('carouselContainer').style.display = 'none';
      return;
    }

    // Update review count
    var totalRatings = CACHED_DATA.total_ratings || reviews.length;
    document.getElementById('reviewCount').textContent = totalRatings;

    // Use a subset for each row to keep DOM size reasonable
    // Pick different reviews for each row
    var mid = Math.ceil(reviews.length / 2);
    var topSet = reviews.slice(0, mid);
    var botSet = reviews.slice(mid);
    if (botSet.length === 0) botSet = topSet;

    // Limit to ~30 unique cards per row for performance, repeat for seamless loop
    var maxPerRow = Math.min(30, topSet.length);
    var topSlice = topSet.slice(0, maxPerRow);
    var botSlice = botSet.slice(0, Math.min(30, botSet.length));

    var topCards = topSlice.map(function(r, i) { return buildCard(r, i); });
    var botCards = botSlice.map(function(r, i) { return buildCard(r, mid + i); });

    var row1 = document.getElementById('row1');
    var row2 = document.getElementById('row2');

    row1.innerHTML = topCards.concat(topCards).join('');
    row2.innerHTML = botCards.concat(botCards).join('');

    var r1Width = row1.scrollWidth;
    var r2Width = row2.scrollWidth;
    row1.style.animationDuration = (r1Width / 50) + 's';
    row2.style.animationDuration = (r2Width / 45) + 's';
  }

  // ─── Init ───
  if (typeof CACHED_DATA !== 'undefined' && CACHED_DATA.reviews && CACHED_DATA.reviews.length > 0) {
    renderCarousel(CACHED_DATA.reviews);
  } else {
    document.getElementById('emptyState').style.display = 'block';
    document.getElementById('carouselContainer').style.display = 'none';
  }

})();
